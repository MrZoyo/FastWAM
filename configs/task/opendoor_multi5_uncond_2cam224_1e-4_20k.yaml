# @package _global_

defaults:
  - override /data: opendoor_multi5
  - override /model: fastwam
  - _self_

# dataloading
batch_size: 16
num_workers: 8

model:
  mot_checkpoint_mixed_attn: false

# scheduler
lr_scheduler_type: "cosine"
learning_rate: 1e-4
num_epochs: 5
max_steps: 20000
log_every: 10
save_every: 10000
eval_every: 500

# training
gradient_accumulation_steps: 1
weight_decay: 1e-2
resume: null

wandb:
  enabled: true
  project: fast-wam
  name: opendoor_multi5_uncond_2cam224_1e-4_20k
  group: opendoor_multi5
  mode: online
