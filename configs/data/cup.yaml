train:
  _target_: fastwam.datasets.lerobot.robot_video_dataset.RobotVideoDataset
  dataset_dirs:
    - /DATA/disk1/zoyo/cup
  shape_meta:
    images:
      - key: head_left
        raw_shape: [3, 480, 640]
        shape: [3, 224, 224]
      - key: right_wrist_left
        raw_shape: [3, 480, 640]
        shape: [3, 224, 224]
    action:
      - key: default
        raw_shape: 7
        shape: 7
    state:
      - key: default
        raw_shape: 8
        shape: 8
  num_frames: 33
  global_sample_stride: 1
  action_video_freq_ratio: 4
  video_size: [224, 448]
  camera_key: null
  val_set_proportion: 0.1
  is_training_set: true
  pretrained_norm_stats: null
  skip_padding_as_possible: false
  concat_multi_camera: "horizontal"
  processor:
    _target_: fastwam.datasets.lerobot.processors.fastwam_processor.FastWAMProcessor
    shape_meta: ${data.train.shape_meta}
    num_obs_steps: ${data.train.num_frames}
    num_output_cameras: 2
    action_output_dim: 7
    proprio_output_dim: 8
    delta_action_dim_mask:
      default: [true, true, true, true, true, true, false]

    action_state_transforms: null
    use_stepwise_action_norm: false
    norm_default_mode: min/max
    norm_exception_mode: null

    action_state_merger:
      _target_: fastwam.datasets.lerobot.transforms.action_state_merger.ConcatLeftAlign

    train_transforms:
      - _target_: fastwam.datasets.lerobot.transforms.image.ToTensor
      - _target_: torchvision.transforms.Resize
        size: [224, 224]
    val_transforms:
      - _target_: fastwam.datasets.lerobot.transforms.image.ToTensor
      - _target_: torchvision.transforms.Resize
        size: [224, 224]
  text_embedding_cache_dir: ./data/text_embeds_cache/cup
  context_len: 128

